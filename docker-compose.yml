services:
  db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_DATABASE: agri_db
      MYSQL_ROOT_PASSWORD: root_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  redis:
    image: redis:alpine
    restart: always
    ports:
      - "6379:6379"

  server:
    build:
      context: .
      dockerfile: Dockerfile.server
    restart: always
    environment:
      DATABASE_URL: mysql://root:root_password@db:3306/agri_db
      REDIS_URL: redis://redis:6379
      PORT: 3001
      NODE_ENV: production
      # Add other environment variables as needed
    depends_on:
      - db
      - redis
    ports:
      - "3001:3001"

  client:
    build:
      context: .
      dockerfile: Dockerfile.client
    restart: always
    ports:
      - "80:80"
    depends_on:
      - server

volumes:
  mysql_data:

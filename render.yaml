services:
  - type: web
    name: agrifocused-api
    env: node
    plan: free
    region: frankfurt # You can change this to a region closer to you (e.g., oregon, ohio)
    branch: master
    buildCommand: "npm install && npx prisma generate && npx prisma db push"
    startCommand: "npm start"
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: DATABASE_URL
        sync: false # You must set this manually in the Render Dashboard securely
      - key: JWT_SECRET
        sync: false # You must set this manually in the Render Dashboard securely
      - key: CORS_ORIGINS
        value: "https://agrifocused-final-year.vercel.app,http://localhost:5173,capacitor://localhost"
